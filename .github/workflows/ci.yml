name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  ci:
    if: false
    uses: angr/ci-settings/.github/workflows/angr-ci.yml@master

  installation:
    name: Test installation (${{ matrix.environment.os }}, py${{ matrix.environment.python-version }})
    strategy:
      matrix:
        environment:
          #- os: windows-2025
          #  python-version: 3.12
          - os: windows-11-arm
            python-version: 3.14
          #- os: macos-26
          #  python-version: 3.12
          #- os: ubuntu-24.04
          #  python-version: 3.14
      fail-fast: false
    runs-on: ${{ matrix.environment.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        if: startsWith(runner.os, 'windows')
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      
      - name: Set up Native ARM64 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # Or your target version
          architecture: 'arm64'   # Explicitly binds the execution layer to ARM64
      
      - name: Print Out Python Version Diagnostics
        run: |
          python -c "import sys, platform; print(f'--- DIAGNOSTIC DATA ---\nVersion String: {sys.version}\nPlatform OS: {sys.platform}\nTarget Machine Architecture: {platform.machine()}\n-----------------------')"


      - name: Configure MSVC for Cross-Compilation & Build Wheel For  z3-solver
        shell: cmd
        run: |
          :: 1. Locate and activate the MSVC x64-to-ARM64 cross-compiler toolchain
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64_arm64
          
          :: 2. Set environment variables to force Python build tools to target Windows ARM64
          set CMAKE_GENERATOR=Visual Studio 17 2022
          set CMAKE_GENERATOR_PLATFORM=ARM64
          
          :: 3. Build the wheel directly from source into the 'dist' directory
          pip wheel --no-binary=z3-solver --wheel-dir=dist z3-solver

      
      - name: Configure MSVC for Cross-Compilation & Build Wheel For pydemumble
        shell: cmd
        run: |
          :: 1. Locate and activate the MSVC x64-to-ARM64 cross-compiler toolchain
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64_arm64
          
          :: 2. Set environment variables to force Python build tools to target Windows ARM64
          set CMAKE_GENERATOR=Visual Studio 17 2022
          set CMAKE_GENERATOR_PLATFORM=ARM64
          
          :: 3. Build the wheel directly from source into the 'dist' directory
          pip wheel --no-binary=z3-solver --wheel-dir=dist pydemumble
          
      - name: Install dependencies
        run: | 
          # 1. Compile a strict requirements block directly out of your TOML definitions
          pip install tomli
          python -c "import tomli; f=open('pyproject.toml', 'rb'); data=tomli.load(f); print('\n'.join(data['project']['dependencies']))" > temp_reqs.txt
          # 2. Safely consume the isolated package dependencies
          pip install -r temp_reqs.txt --no-binary pyvex --no-cache-dir

      - name: Compile and Build Package Wheels
        run: |
          # Uses the modern PEP 517 build orchestrator to execute setup.py / pyproject.toml 
          python -m build --wheel
          
          # Optional Legacy fallback line if your repository has no pyproject.toml:
          # python setup.py bdist_wheel
        
 #     - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v6
 #     - name: Sync dependencies
 #       run: uv sync -p ${{ matrix.environment.python-version }}  --no-binary-package pyvex
 #       #pyvex has the wrong dll
 #     - name: Collect tests
 #       run: uv run pytest --collect-only tests
      
      # 3. Build only the wheel distribution
 #     - name: Build Wheel
 #       run: uv build --wheel
      
      # 4. Collect and upload the built wheel artifact
      - name: Upload Built Wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  rust_check:
    if: false
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: clippy, rustfmt
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo fmt --all -- --check

  rust_test:
    if: false
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v5
        with:
          python-version: "3.12"
      - run: cargo test --release
